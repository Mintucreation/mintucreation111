function makeEmptyAccessories() {

/* ---- Import: parse an exported Excel file back into app rows ---- */
function normalizeDateCell(val) {
  if (!val && val !== 0) return "";
  if (val instanceof Date) return val.toISOString().slice(0, 10);
  var s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  return s;
}
function parseAccessoriesDetails(str) {
  var out = makeEmptyAccessories();
  if (!str) return out;
  var parts = String(str).split(";").map(function (p) { return p.trim(); }).filter(Boolean);
  for (var i = 0; i < parts.length && i < ACCESSORY_SLOTS; i++) {
    var m = parts[i].match(/^(.*):\s*Rs\.?\s*([\d,]+(?:\.\d+)?)/i);
    if (m) out[i] = { name: m[1].trim(), amount: m[2].replace(/,/g, "") };
    else out[i] = { name: parts[i], amount: "" };
  }
  return out;
}

  f.insuranceAmount = row["Insurance amount"] || "";

/* ===================== Root (Supabase auth gate) ===================== */
function Root() {
  var stateState = useState("checking"); var authState = stateState[0], setAuthState = stateState[1];
  var emailState = useState(""); var userEmail = emailState[0], setUserEmail = emailState[1];

  useEffect(function () {
    sb.auth.getSession().then(function (result) {
      var session = result.data && result.data.session;
      if (session) { setUserEmail(session.user.email); setAuthState("app"); }
      else { setAuthState("login"); }
    });
    var sub = sb.auth.onAuthStateChange(function (event, session) {
      if (session) { setUserEmail(session.user.email); setAuthState("app"); }
      else { setAuthState("login"); }
    });
    return function () { sub.data.subscription.unsubscribe(); };
  }, []);

  async function handleLogout() {
    await sb.auth.signOut();
    setAuthState("login");
  }

  if (authState === "checking") return e("div", { className: "min-h-screen flex items-center justify-center text-slate-400", style: { background: "#0f172a" } }, "Loading…");
  if (authState === "login") return e(AuthScreen, { onLoginSuccess: function () {} });
  return e("div", { style: { background: "linear-gradient(180deg, #f8fafc, #eef2f6)", minHeight: "100vh" } }, e(MainApp, { userEmail: userEmail, onLogout: handleLogout }));
}

var rootEl = document.getElementById("root");
if (typeof ReactDOM.createRoot === "function") { ReactDOM.createRoot(rootEl).render(e(Root)); }
else { ReactDOM.render(e(Root), rootEl); }
</script>
